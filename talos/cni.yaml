cluster:
  network:
    cni:
      # no Flannel
      name: none
  proxy:
    # no kube-proxy
    disabled: true
# Install cilium via job
# https://www.talos.dev/v1.11/kubernetes-guides/network/deploying-cilium/#method-5-using-a-job
  inlineManifests:
    - name: cilium-install
      contents: |
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: cilium-install
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
        - kind: ServiceAccount
          name: cilium-install
          namespace: kube-system
        ---
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: cilium-install
          namespace: kube-system
        # Cilium install Job is no longer needed -- Cilium v1.18.1 is already installed and running.
        # To upgrade Cilium configuration, use: cilium upgrade or manage via Helm directly.