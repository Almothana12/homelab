apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: '2026.5.2'
      sourceRef:
        kind: HelmRepository
        name: authentik
      interval: 5m
  values:
    authentik:
      # log_level: trace
      existingSecret:
        secretName: authentik-secret
    server:
      ingress:
        enabled: true
        ingressClassName: cilium
        hosts:
          - sso.almothana.sa
        tls:
          - secretName: almothana-sa-tls
            hosts:          
              - sso.almothana.sa

    postgresql:
      enabled: false # will use cnpg instead of the built-in postgresql chart
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: host
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: dbname
        - name: AUTHENTIK_POSTGRESQL__PORT
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: port
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: username
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: password
        - name: AUTHENTIK_EMAIL__HOST
          value: "mail.almothana.sa"
        - name: AUTHENTIK_EMAIL__PORT
          value: "465"
        - name: AUTHENTIK_EMAIL__USE_TLS
          value: "false" # use SSL, not TLS STARTTLS
        - name: AUTHENTIK_EMAIL__USE_SSL
          value: "true"
        - name: AUTHENTIK_EMAIL__TIMEOUT
          value: "30"
        - name: AUTHENTIK_EMAIL__FROM
          value: "no-reply@almothana.sa"