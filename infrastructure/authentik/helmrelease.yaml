apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: '2026.5.2'
      sourceRef:
        kind: HelmRepository
        name: authentik
      interval: 5m
  values:
    authentik:
      log_level: trace
      existingSecret:
        secretName: authentik-secret
    server:
      ingress:
        enabled: true
        ingressClassName: cilium
        hosts:
          - authentik.almothana.cloud
        tls:
          - secretName: almothana-cloud-tls
            hosts:          
              - authentik.almothana.cloud
    postgresql:
      enabled: false # will use cnpg instead of the built-in postgresql chart
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: host
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: dbname
        - name: AUTHENTIK_POSTGRESQL__PORT
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: port
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: username
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-cluster-v00-app
              key: password


