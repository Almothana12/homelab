apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik-cluster-v00
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: cnpg-system
  interval: 5m
  chart: 
    spec:
      chart: cluster
      version: 0.6.1
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 5m
  values:
    type: postgresql
    mode: standalone
    version:
      postgresql: "16"
    # recovery:
    #   method: object_store
    #   clusterName: authentik-cluster-v01
    #   provider: s3
    #   endpointURL: "http://192.168.0.109:9000"
    #   secret:
    #     create: false
    #     name: backup-s3-credentials
    #   s3:
    #     bucket: "authentik-backup"
    cluster:
      instances: 2
      primaryUpdateStrategy: unsupervised
      storage:
        size: 5Gi
      pg_hba:
        - host all xormon 10.244.0.0/16 md5
      monitoring:
        enabled: true
        podMonitor:
          enabled: true
      roles:
        - name: xormon
          ensure: present
          comment: XORMON monitoring
          login: true
          superuser: false
          passwordSecret:
            name: xormon-auth
          inRoles:
            - pg_monitor
      # Force instances to be scheduled on different nodes
      affinity:
        enablePodAntiAffinity: true
        podAntiAffinityType: required
        topologyKey: kubernetes.io/hostname
    backups:
      enabled: true
      provider: s3
      endpointURL: "http://192.168.0.109:9000"
      encryption: ""
      compression: "gzip"
      wal:
        encryption: ""
        compression: "gzip"
      data:
        encryption: ""
        compression: "gzip"
      secret:
        create: false
        name: backup-s3-credentials
      s3:
        bucket: "authentik-backup"
      scheduledBackups:
        - name: daily-backup
          schedule: "0 0 0 * * *" # Daily at midnight
          backupOwnerReference: self
      retentionPolicy: "14d"  