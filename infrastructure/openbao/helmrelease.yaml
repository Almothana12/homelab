apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
spec:
  interval: 5m
  chart:
    spec:
      chart: openbao
      version: '0.28.4'
      sourceRef:
        kind: HelmRepository
        name: openbao
      interval: 5m
  values:
    server:
      enabled: "true"
      ingress:
        enabled: true
        # annotations:
        #   nginx.org/ssl-services: "openbao" # SSL Redirect
        ingressClassName: "nginx"
        pathType: Prefix

        # When HA mode is enabled and K8s service registration is being used,
        # configure the ingress to point to the OpenBao active service.
        # activeService: true
        hosts:
          - host: openbao.almothana.xyz
        tls:
          - secretName: almothana-xyz-tls
            hosts:
              - openbao.almothana.xyz
