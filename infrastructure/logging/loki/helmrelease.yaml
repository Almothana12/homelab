apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 5m
  chart:
    spec:
      chart: loki
      version: '7.1.0'
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 5m
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        # Single instance -> no replication (default is 3, which won't start with 1 replica)
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2025-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      querier:
        # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
        max_concurrent: 2
      # Enforce retention on the local disk, otherwise the PVC just fills up forever
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 336h # 14 days retention
      # Store everything (chunks + index) on the local PVC - no S3/MinIO needed
      storage:
        type: filesystem
    # Run everything in one process, backed by the local PVC
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
    # Disable the scalable-mode components
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    # Disable the memcached caches (biggest memory hog in the default chart)
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    # Drop the extra monitoring pods
    lokiCanary:
      enabled: false
    test:
      enabled: false
    # No nginx gateway - Alloy pushes straight to the loki service
    gateway:
      enabled: false
