apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 5m
  chart:
    spec:
      chart: alloy
      version: '1.11.0'
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 5m
  values:
    # This config tails logs via the Kubernetes API (loki.source.kubernetes),
    # so a single Deployment replica collects every pod's logs once.
    # A DaemonSet would run one Alloy per node and duplicate all logs.
    controller:
      type: deployment
      replicas: 1
    alloy:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      configMap:
        create: false
        name: alloy-config
        key: config.alloy
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts: ["alloy.almothana.xyz"]
      tls:
        - secretName: almothana-xyz-tls
          hosts: ["alloy.almothana.xyz"]
