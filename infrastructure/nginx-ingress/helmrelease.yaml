apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress
spec:
  interval: 5m
  chart:
    spec:
      chart: nginx-ingress
      version: '2.6.4'
      sourceRef:
        kind: HelmRepository
        name: nginx-ingress
      interval: 5m
  values: 
    controller:
      kind: daemonset
      service:
        type: LoadBalancer