apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: o2c
spec:
  interval: 5m
  chart:
    spec:
      chart: openobserve-collector
      version: '0.4.5'
      sourceRef:
        kind: HelmRepository
        name: openobserve
      interval: 5m

  valuesFrom:
    - kind: Secret
      name: o2c-auth
      valuesKey: authorization
      targetPath: exporters.otlphttp/openobserve.headers.Authorization
      optional: false
    - kind: Secret
      name: o2c-auth
      valuesKey: authorization
      targetPath: exporters.otlphttp/openobserve_k8s_events.headers.Authorization
      optional: false

  values:
    k8sCluster: homelab
    exporters:
      otlphttp/openobserve:
        endpoint: http://openobserve-standalone.openobserve.svc.cluster.local:5080/api/default
      otlphttp/openobserve_k8s_events:
        endpoint: http://openobserve-standalone.openobserve.svc.cluster.local:5080/api/default
