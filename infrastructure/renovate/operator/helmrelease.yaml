apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  interval: 5m
  chart:
    spec:
      chart: renovate-operator
      version: '4.7.1'
      sourceRef:
        kind: HelmRepository
        name: mogenius
      interval: 24h
  values:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    rbac:
      ownNamespaceOnly: true # we only create renovate jobs in the same namespace
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
