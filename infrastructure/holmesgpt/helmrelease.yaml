apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  interval: 5m
  chart:
    spec:
      chart: holmes
      version: '0.31.1'
      sourceRef:
        kind: HelmRepository
        name: robusta
      interval: 5m
  values: 
    operator:
      enabled: true  
      holmesApiTimeout: 300  # API timeout in seconds
      maxHistoryItems: 10  # History entries per ScheduledHealthCheck

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPU: "60"
      targetMemory: ""
      behavior: {}

    mcpAddons:
      github:
        enabled: true
        auth:
          githubApp:
            secretName: "holmes-github-app"

    additionalEnvVars:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: holmes-secrets
          key: openai-api-key
    - name: OPENAI_API_BASE
      valueFrom:
        secretKeyRef:
          name: holmes-secrets
          key: openai-api-base
    # default model
    - name: MODEL
      value: mimo-v2.5-pro

    modelList:
      mimo-v2.5-pro:
        api_key: "{{ env.OPENAI_API_KEY }}"
        api_base: "{{ env.OPENAI_API_BASE }}"
        model: mimo-v2.5-pro
        temperature: 0.6
        input_cost_per_token: 0.000000435
        output_cost_per_token: 0.00000087