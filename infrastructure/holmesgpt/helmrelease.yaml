apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  interval: 5m
  chart:
    spec:
      chart: holmes
      version: '0.31.1'
      sourceRef:
        kind: HelmRepository
        name: robusta
      interval: 5m
  values: 
    operator:
      enabled: true  
      holmesApiTimeout: 300  # API timeout in seconds
      maxHistoryItems: 10  # History entries per ScheduledHealthCheck

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPU: "60"
      targetMemory: ""
      behavior: {}

    mcpAddons:
      github:
        enabled: true
        auth:
          githubApp:
            secretName: "holmes-github-app"

    additionalEnvVars:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: holmes-secrets
          key: openai-api-key
    - name: OPENAI_API_BASE
      valueFrom:
        secretKeyRef:
          name: holmes-secrets
          key: openai-api-base
    # default model
    - name: MODEL
      value: mimo-v2.5-pro
    - name: OVERRIDE_MAX_OUTPUT_TOKEN
      value: "131072" # from https://mimo.mi.com/docs/en-US/quick-start/summary/model

    modelList:
      mimo-v2.5-pro:
        api_key: "{{ env.OPENAI_API_KEY }}"
        api_base: "{{ env.OPENAI_API_BASE }}"
        model: mimo-v2.5-pro
        temperature: 0.6
        # mimo-v2.5-pro domestic pricing: ¥3.00/M input (cache miss), ¥6.00/M
        # output. Converted to USD/token at ~¥7.2/USD (rough estimate).
        input_cost_per_token: 0.000000417
        output_cost_per_token: 0.000000833
        custom_args:
          max_context_size: 1000000
        # MiMo enables "deep thinking" by default; reasoning output breaks the
        # strict-JSON structured response Holmes parses (and misbehaves in the
        # multi-turn tool loop). Disable it via the raw request body.
        extra_body:
          thinking:
            type: disabled