apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  interval: 5m
  chart:
    spec:
      chart: holmes
      version: '0.32.0'
      sourceRef:
        kind: HelmRepository
        name: robusta
      interval: 5m
  values: 
    operator:
      enabled: true  
      holmesApiTimeout: 300  # API timeout in seconds
      maxHistoryItems: 10  # History entries per ScheduledHealthCheck

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPU: "60"
      targetMemory: ""
      behavior: {}

    mcpAddons:
      github:
        enabled: true
        auth:
          githubApp:
            secretName: "holmes-github-app"

    additionalEnvVars:
    - name: GEMINI_API_KEY
      valueFrom:
        secretKeyRef:
          name: holmes-secrets
          key: gemini-api-key
    - name: TOOL_SCHEMA_NO_PARAM_OBJECT_IF_NO_PARAMS
      value: "true"  # Required for Gemini - see Environment Variables Reference
    # default model
    - name: MODEL
      value: gemini-flash

    modelList:
      gemini-pro:
        api_key: "{{ env.GEMINI_API_KEY }}"
        model: gemini/gemini-pro
        temperature: 1

      gemini-flash:
        api_key: "{{ env.GEMINI_API_KEY }}"
        model: gemini/gemini-3.5-flash
        temperature: 1

      gemini-pro-exp:
        api_key: "{{ env.GEMINI_API_KEY }}"
        model: gemini/gemini-exp-1206
        temperature: 1