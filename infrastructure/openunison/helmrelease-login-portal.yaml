apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orchestra-login-portal
  namespace: openunison
spec:
  interval: 30m
  dependsOn:
    - name: orchestra
  chart:
    spec:
      chart: orchestra-login-portal
      version: "2.3.94"
      sourceRef:
        kind: HelmRepository
        name: tremolo
  install:
    disableWait: true
    disableWaitForJobs: true
  upgrade:
    disableWait: true
    disableWaitForJobs: true
  valuesFrom:
    - kind: ConfigMap
      name: openunison-values
      valuesKey: values.yaml