apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  interval: 24h
  chart:
    spec:
      chart: openebs
      version: '4.4.0'
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: openebs
      interval: 24h
  values:
    engines:
      replicated:
        mayastor:
          enabled: false
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
    loki:
      enabled: false
    alloy:
      enabled: false
    localpv-provisioner:
      localpv:
        basePath: "/var/openebs/local/hostpath"


