apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  interval: 24h
  chart:
    spec:
      chart: openebs
      version: '4.4.0'
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: openebs
      interval: 24h
  values:
    mayastor:
      io_engine:
        envcontext: "iova-mode=pa" # to fix this error: https://github.com/openebs/mayastor/issues/1571
    engines:
      replicated:
        mayastor:
          enabled: true
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false

