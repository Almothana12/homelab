apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freshrss
spec:
  ingressClassName: cilium
  rules:
  - host: freshrss.almothana.sa
    http:
      paths:
      - backend:
          service:
            name: freshrss
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
    - hosts:
        - freshrss.almothana.sa
      secretName: almothana-sa-tls