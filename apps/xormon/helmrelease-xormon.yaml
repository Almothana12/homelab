apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: xormon-cluster-v00
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: cnpg-system
  interval: 5m
  chart: 
    spec:
      chart: cluster
      version: 0.7.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 5m
  values:
    type: timescaledb
    mode: standalone
    version:
      postgresql: "16"
      timescaledb: "2.26"
    # recovery:
    #   method: object_store
    #   clusterName: xormon-cluster-v01
    #   provider: s3
    #   endpointURL: "http://192.168.0.109:9000"
    #   secret:
    #     create: false
    #     name: backup-s3-credentials
    #   s3:
    #     bucket: "xormon-backup"
    cluster:
      # imageName: ghcr.io/clevyr/cloudnativepg-timescale:16
      instances: 3
      primaryUpdateStrategy: unsupervised
      storage:
        size: 5Gi
      # pg_hba:
      #   - host all xormon 10.244.0.0/16 md5
      monitoring:
        enabled: true
        podMonitor:
          enabled: true
      # Force instances to be scheduled on different nodes
      affinity:
        enablePodAntiAffinity: true
        podAntiAffinityType: required
        topologyKey: kubernetes.io/hostname
      # hard-code service names to avoid it changing for different versions
      services:
        additional:
          - selectorType: rw
            serviceTemplate:
              metadata:
                name: "xormon-cluster-rw"
          - selectorType: ro
            serviceTemplate:
              metadata:
                name: "xormon-cluster-ro"
          - selectorType: r
            serviceTemplate:
              metadata:
                name: "xormon-cluster-r"
    backups:
      enabled: true
      provider: s3
      endpointURL: "http://192.168.0.109:9000"
      encryption: ""
      compression: "gzip"
      wal:
        encryption: ""
        compression: "gzip"
      data:
        encryption: ""
        compression: "gzip"
      secret:
        create: false
        name: backup-s3-credentials
      s3:
        bucket: "xormon-backup"
        path: "/v2"

      scheduledBackups:
        - name: daily-backup
          schedule: "0 0 0 * * *" # Daily at midnight
          backupOwnerReference: self
      retentionPolicy: "14d"  