apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 5m
  chart:
    spec:
      chart: seerr
      version: '3.3.0'
      sourceRef:
        kind: HelmRepository
        name: seerr
      interval: 5m
  values: 
    image:
      repository: seerr-team/seerr
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      privileged: false
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    config:
      persistence:
        name: 'seerr'
        size: 512Mi
        accessModes:
          - ReadWriteOnce
    ingress:
      enabled: true
      ingressClassName: 'cilium'
      hosts:
        - host: seerr.almothana.xyz
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: almothana-xyz-tls
          hosts:
            - seerr.almothana.xyz