apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bulwark
  name: bulwark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bulwark
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bulwark
    spec:
      containers:
        - image: ghcr.io/bulwarkmail/webmail:1.7.6
          name: bulwark
          resources: {}
          envFrom:
           - secretRef:
              name: bulwark-env
           - configMapRef:
              name: bulwark-env
          env:
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          livenessProbe:
            initialDelaySeconds: 3
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            exec:
              command:
                - wget
                - --no-verbose
                - --tries=1
                - --spider
                - http://127.0.0.1:3000/api/health
          volumeMounts:
            - name: bulwark
              mountPath: /app/data/settings
              subPath: settings
            - name: bulwark
              mountPath: /app/data/admin
              subPath: admin
              readOnly: true
            - name: bulwark
              mountPath: /app/data/admin-state
              subPath: admin-state
            - name: bulwark
              mountPath: /app/data/telemetry
              subPath: telemetry
      restartPolicy: Always
      volumes:
        - name: bulwark
          persistentVolumeClaim:
            claimName: bulwark