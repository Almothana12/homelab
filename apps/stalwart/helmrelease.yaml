apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stalwart
spec:
  interval: 5m
  chart:
    spec:
      chart: apps/stalwart/chart
      sourceRef:
        kind: GitRepository
        name: stalwart-chart
      interval: 5m
  values: 
    fullnameOverride: stalwart
    # Container image.
    image:
      repository: stalwartlabs/stalwart
      tag: "v0.16"
      pullPolicy: IfNotPresent

    # Number of pods in the StatefulSet.
    # Single-node deployments keep this at 1.
    # For a clustered deployment, raise this value and set `role` (and
    # `pushShard` where applicable) to a value that makes sense for the
    # whole StatefulSet, or install multiple releases of this chart with
    # different role values.
    replicaCount: 1

    # Maps to STALWART_ROLE. Names a ClusterRole defined in the database.
    # Leave empty on single-node installs to run every task and listener.
    # See /docs/cluster/configuration/roles for the role model.
    role: ""

    # Maps to STALWART_PUSH_SHARD. Only set on nodes whose role delivers
    # push notifications. Leave empty on single-node installs.
    pushShard: ""

    # Recovery / bootstrap administrator credential.
    # Enable this on first install so the operator can sign in without
    # scraping the pod logs for the generated temporary password.
    # Remove it once a permanent administrator account has been
    # provisioned through the setup wizard.
    recoveryAdmin:
      enabled: true
      username: admin
      password: "change-me"

    # Starts the pods in recovery mode. Suspends mail services and
    # exposes only the management listener on the configured port.
    # See /docs/configuration/recovery-mode.
    recoveryMode:
      enabled: false
      port: 8080
      logLevel: info

    # Extra environment variables injected into the container, for
    # store credentials that live in plain text.
    extraEnv: {}

    # Extra environment variables injected from the managed Secret.
    # Use this for anything sensitive (database passwords, S3 keys, etc.).
    extraSecretEnv: {}

    # config.json contents. Rendered verbatim into the ConfigMap.
    # Only the DataStore object belongs here; every other setting lives
    # in the database once the server is bootstrapped.
    # See /docs/configuration/overview and /docs/ref/object/data-store.
    config:
      "@type": "PostgreSql"
      host: "stalwart-cluster-rw"
      port: 5432
      database: "app"
      authUsername: "app"
      authSecret: 
        "@type": "File"
        filePath: "/etc/stalwart/db-password/password"
      poolMaxConnections: 10

    # Service definition. Change `type` to LoadBalancer when a cloud
    # load balancer should expose the mail ports directly, or keep it
    # as ClusterIP and front the chart with an Ingress / gateway for
    # the HTTP listeners only.
    service:
      type: LoadBalancer
      annotations:
        external-dns.alpha.kubernetes.io/hostname: mail.almothana.cloud
      ports:
        smtp: 25
        smtps: 465
        submission: 587
        imap: 143
        imaps: 993
        pop3: 110
        pop3s: 995
        sieve: 4190
        http: 80
        https: 443
        mgmt: 8080

    # Ingress for the HTTP / HTTPS listeners only. Mail protocols
    # require L4 exposure and are not handled here.
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.org/ssl-services: "stalwart"
      hosts:
        - host: stalwart.almothana.cloud
          paths:
            - path: /
              pathType: Prefix
              portName: https
      tls:
        - secretName: almothana-cloud-tls
          hosts:
            - stalwart.almothana.cloud

    # Persistent volume for the data directory. Required when the
    # DataStore is a local backend such as RocksDB. Can be disabled
    # for deployments that use an external store (PostgreSQL, MySQL,
    # FoundationDB, S3-backed blob store, etc.).
    persistence:
      enabled: false
      accessMode: ReadWriteOnce
      storageClass: ""
      size: 20Gi

    # Resource requests and limits for the container.
    resources: {}

    # Pod-level security context. Applied to every container in the pod.
    # The defaults are sufficient for the `baseline` Pod Security Standard.
    # See "Restricted Pod Security Standards" below for the override
    # required under the `restricted` profile.
    podSecurityContext:
      fsGroup: 2000
      runAsUser: 2000
      runAsGroup: 2000

    # Container-level security context for the stalwart container.
    # Empty by default. Set this to opt into the `restricted` Pod Security
    # Standard; see "Restricted Pod Security Standards" below.
    containerSecurityContext: {}

    # Extra volumes added to the pod. Pairs with extraVolumeMounts.
    # Use for mounting Secrets, ConfigMaps, or additional PVCs.
    extraVolumes:
      - name: db-password
        secret:
          secretName: stalwart-cluster-v00-app
          defaultMode: 0400
      - name: bind-password
        secret:
          secretName: ldap-bind-password
          defaultMode: 0400
      - name: almothana-cloud-tls
        secret:
          secretName: almothana-cloud-tls
          defaultMode: 0400

    # Extra volume mounts added to the stalwart container.
    extraVolumeMounts:
      - name: db-password
        mountPath: /etc/stalwart/db-password
        readOnly: true
      - name: bind-password
        mountPath: /etc/stalwart/ldap-bind-password
        readOnly: true
      - name: almothana-cloud-tls
        mountPath: /etc/stalwart/ssl
        readOnly: true