apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease-lubelogger-cluster.yaml
  - secret-helm-values.yaml
  - helmrepo.yaml
  - helmrelease.yaml

configMapGenerator:
  - name: helm-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true